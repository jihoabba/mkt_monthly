<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Banner Maker</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (xlsx-js-style) for Styled Excel Export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.min.js"></script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8f9fa; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.3s ease-out forwards; }
        
        /* 테이블 스타일 강화 */
        .result-table th { background-color: #f3f4f6; color: #1f2937; font-weight: 700; padding: 12px; text-align: left; border-bottom: 2px solid #e5e7eb; }
        .result-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
        .result-table tr:hover { background-color: #f9fafb; }
    </style>
</head>
<body class="text-[#121212]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* --- Essential Icons --- */
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const MessageCircle = (props) => <IconBase {...props}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" /></IconBase>;
        const Copy = (props) => <IconBase {...props}><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></IconBase>;
        const Send = (props) => <IconBase {...props}><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></IconBase>;
        const CheckSquare = (props) => <IconBase {...props}><polyline points="9 11 12 14 22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></IconBase>;
        const Square = (props) => <IconBase {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /></IconBase>;
        const FileSpreadsheet = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></IconBase>;
        const Image = (props) => <IconBase {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></IconBase>;
        const Eye = (props) => <IconBase {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></IconBase>;
        const EyeOff = (props) => <IconBase {...props}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></IconBase>;
        const ArrowLeft = (props) => <IconBase {...props}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></IconBase>;

        /* --- UI Components --- */
        const Input = (props) => <input {...props} className={`w-full border border-[#e5e5e5] p-3 md:p-4 text-base focus:outline-none focus:border-[#FEE500] focus:ring-1 focus:ring-[#FEE500] transition-all rounded-[4px] placeholder-gray-300 ${props.className || ''}`} />;
        const Label = ({ children }) => <label className="block text-sm font-bold text-[#121212] mb-2 uppercase tracking-wide">{children}</label>;

        /* --- Main Application --- */
        const KakaoBannerApp = () => {
            // View State: 'input' | 'result'
            const [step, setStep] = useState('input');
            const [notification, setNotification] = useState('');

            // Data State
            const [projectTitle, setProjectTitle] = useState('');
            const [deadline, setDeadline] = useState(new Date().toISOString().split('T')[0]);

            const BANNER_LIST = [
                { id: '0_logo', name: '0. 브랜드 로고', hasCopy: false },
                { id: '1_thumb', name: '1. 팬덤·캐릭터관 썸네일', hasCopy: false, note: '통합몰/브랜드관 어셋 사용' },
                { id: '2_bubble', name: '2. 상단 버블 이미지', hasCopy: false },
                { id: '3_highlight', name: '3. 하이라이트 배너', hasCopy: true, copyGuide: { main: '20자 이내', sub: null }, exampleUrl: 'https://cdn.shopify.com/s/files/1/0513/1599/8919/files/92e65df57e96df9a788ea73301bb02e7_430x.png?v=1771479557' },
                { id: '4_rolling', name: '4. 롤링 배너', hasCopy: true, copyGuide: { main: '15자 이내', sub: '30자 이내' }, exampleUrl: 'https://cdn.shopify.com/s/files/1/0513/1599/8919/files/04._430x.png?v=1771478608' },
                { id: '5_gate', name: '5. 프로모션관 대문', hasCopy: true, copyGuide: { main: '', sub: '' } },
                { id: '6_share', name: '6. 공유 이미지 (720, 640)', hasCopy: false },
                { id: '7_artist', name: '7. 아티스트 카테고리', hasCopy: true, copyGuide: { main: '16자 이내', sub: '18자 이내' }, exampleUrl: 'https://cdn.shopify.com/s/files/1/0513/1599/8919/files/720x200_430x.png?v=1771478910' },
                { id: '8_search', name: '8. 검색 스페셜 배너', hasCopy: false },
                { id: '9_message', name: '9. 메시지 카드', hasCopy: false },
                { id: '10_gift', name: '10. 이야기가 있는 선물', hasCopy: true, copyGuide: { main: '기획전 타이틀', sub: '설명 문구' }, exampleUrl: 'https://cdn.shopify.com/s/files/1/0513/1599/8919/files/2026-02-19_2.33.37_430x.png?v=1771479250' },
                { id: '11_brand', name: '11. 브랜드 카드', hasCopy: true, copyGuide: { main: null, sub: '20자 이내' }, exampleUrl: 'https://cdn.shopify.com/s/files/1/0513/1599/8919/files/FORME_____1210_430x.png?v=1771479611' },
                { id: '12_insta', name: '12. 인스타그램 (피드, 스토리)', hasCopy: true, copyGuide: { main: null, sub: '15자 이내' } },
                { id: '13_special', name: '13. 특전 안내', hasCopy: false },
                { id: '14_killer', name: '14. 킬러 카드', hasCopy: false },
                { id: '14_1_coming', name: '14-1. 커밍순 대표 이미지', hasCopy: false },
                { id: '15_emoticon', name: '15. 이모티콘 배너', hasCopy: false },
            ];

            const [selectedIds, setSelectedIds] = useState(new Set());
            const [copyTexts, setCopyTexts] = useState({});
            const [visibleImages, setVisibleImages] = useState(new Set());

            // Logic
            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 3000);
            };

            const toggleSelection = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };

            const allBannerIds = BANNER_LIST.map(item => item.id);
            const isAllSelected = allBannerIds.every(id => selectedIds.has(id));

            const handleSelectAll = () => {
                if (isAllSelected) setSelectedIds(new Set());
                else setSelectedIds(new Set(allBannerIds));
            };

            const toggleImage = (id) => {
                const newSet = new Set(visibleImages);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setVisibleImages(newSet);
            };

            const handleCopyChange = (id, type, value) => {
                setCopyTexts(prev => ({
                    ...prev,
                    [id]: { ...prev[id], [type]: value }
                }));
            };

            const getEmbedUrl = (url) => {
                if (!url) return '';
                if (url.includes('drive.google.com') && url.includes('/file/d/')) {
                    const idMatch = url.match(/\/file\/d\/([^/]+)/);
                    if (idMatch && idMatch[1]) {
                        return `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
                    }
                }
                return url;
            };

            // Markdown Table
            const generateMarkdown = () => {
                let table = `[디자인 요청서 - 카카오톡 선물하기]\n`;
                table += `📂 프로젝트: ${projectTitle}\n`;
                table += `📅 마감기한: ${deadline}\n\n`;
                table += `| 번호 | 항목명 | 메인 카피 | 서브 카피 | 비고 |\n`;
                table += `| :--- | :--- | :--- | :--- | :--- |\n`;

                let hasSelection = false;

                BANNER_LIST.forEach(item => {
                    if (selectedIds.has(item.id)) {
                        const texts = copyTexts[item.id] || {};
                        const mainCopy = texts.main || '-';
                        const subCopy = texts.sub || '-';
                        const note = item.note || 'KV 활용';
                        table += `| ${item.name} | ${item.name.split('. ')[1]} | ${mainCopy} | ${subCopy} | ${note} |\n`;
                        hasSelection = true;
                    }
                });
                return hasSelection ? table : "선택된 배너가 없습니다.";
            };

            const copyToClipboard = () => {
                const text = generateMarkdown();
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showNotification('텍스트(마크다운)가 복사되었습니다!');
            };

            // Excel Download Function (xlsx-js-style)
            const downloadExcel = () => {
                if (selectedIds.size === 0) {
                    showNotification('선택된 항목이 없어 다운로드할 수 없습니다.');
                    return;
                }

                const wb = XLSX.utils.book_new();
                
                // --- 1. Define Styles ---
                const headerStyle = {
                    font: { bold: true, color: { rgb: "000000" } },
                    fill: { fgColor: { rgb: "F3F4F6" } }, // Light Gray
                    border: {
                        top: { style: "thin", color: { rgb: "E5E7EB" } },
                        bottom: { style: "thin", color: { rgb: "E5E7EB" } },
                        left: { style: "thin", color: { rgb: "E5E7EB" } },
                        right: { style: "thin", color: { rgb: "E5E7EB" } }
                    },
                    alignment: { horizontal: "center", vertical: "center" }
                };

                const cellStyle = {
                    alignment: { vertical: "top", wrapText: true },
                    border: {
                        top: { style: "thin", color: { rgb: "E5E7EB" } },
                        bottom: { style: "thin", color: { rgb: "E5E7EB" } },
                        left: { style: "thin", color: { rgb: "E5E7EB" } },
                        right: { style: "thin", color: { rgb: "E5E7EB" } }
                    }
                };
                
                // --- 2. Prepare Data ---
                // Header Information
                const wsData = [
                    ["배너 가이드", "https://drive.google.com/drive/folders/1lYaOs1T5BfO1h8iIh3S456p3ivW31r0-", "", "", ""],
                    [], // Empty row for spacing
                    ["프로젝트명", projectTitle || "(입력 안됨)", "", "", ""],
                    ["마감기한", deadline, "", "", ""],
                    [], // Empty row for spacing
                    ["번호", "항목명", "메인 카피", "서브 카피", "비고"] // Table Header
                ];

                // Table Content
                BANNER_LIST.forEach(item => {
                    if (selectedIds.has(item.id)) {
                        const texts = copyTexts[item.id] || {};
                        
                        // Fix for 14-1 date conversion: Split and keep as string
                        const parts = item.name.split('. ');
                        const number = parts[0]; // "14-1"
                        const name = parts.slice(1).join('. ');
                        
                        const mainCopy = texts.main || '-';
                        const subCopy = texts.sub || '-';
                        const note = item.note || 'KV 활용';
                        
                        wsData.push([number, name, mainCopy, subCopy, note]);
                    }
                });

                // --- 3. Create Worksheet ---
                const ws = XLSX.utils.aoa_to_sheet(wsData);

                // --- 4. Apply Column Widths ---
                ws['!cols'] = [
                    { wch: 8 },  // A: 번호 (Narrow)
                    { wch: 30 }, // B: 항목명 (Wide)
                    { wch: 40 }, // C: 메인 카피 (Wider)
                    { wch: 40 }, // D: 서브 카피 (Wider)
                    { wch: 20 }  // E: 비고
                ];

                // --- 5. Apply Styles & Types ---
                // Range for table data starts at row 6 (index 5, due to guide link + spacing + project info + spacing)
                const range = XLSX.utils.decode_range(ws['!ref']);
                
                // Apply hyperlink to guide link cell
                if (ws['B1']) {
                    ws['B1'].l = { Target: "https://drive.google.com/drive/folders/1lYaOs1T5BfO1h8iIh3S456p3ivW31r0-" };
                    ws['B1'].s = {
                        font: { color: { rgb: "1155CC" }, underline: true },
                        alignment: { vertical: "center" },
                        border: {
                            top: { style: "thin", color: { rgb: "E5E7EB" } },
                            bottom: { style: "thin", color: { rgb: "E5E7EB" } },
                            left: { style: "thin", color: { rgb: "E5E7EB" } },
                            right: { style: "thin", color: { rgb: "E5E7EB" } }
                        }
                    };
                }
                if (ws['A1']) {
                    ws['A1'].s = {
                        font: { bold: true },
                        fill: { fgColor: { rgb: "E8F0FE" } },
                        alignment: { horizontal: "center", vertical: "center" },
                        border: {
                            top: { style: "thin", color: { rgb: "E5E7EB" } },
                            bottom: { style: "thin", color: { rgb: "E5E7EB" } },
                            left: { style: "thin", color: { rgb: "E5E7EB" } },
                            right: { style: "thin", color: { rgb: "E5E7EB" } }
                        }
                    };
                }
                
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
                        if (!ws[cell_address]) continue;

                        // Apply styles
                        if (R === 5) { // Header Row (now row index 5)
                            ws[cell_address].s = headerStyle;
                        } else if (R > 5) { // Data Rows
                            ws[cell_address].s = cellStyle;
                            
                            // Specific fix for "Number" column (Column A, Index 0)
                            // Force type to 'string' to prevent "14-1" -> Date conversion
                            if (C === 0) {
                                ws[cell_address].t = 's'; 
                            }
                        }
                    }
                }
                
                // Merge cells for better look
                ws['!merges'] = [
                    { s: { r: 0, c: 1 }, e: { r: 0, c: 4 } }, // Merge Guide Link
                    { s: { r: 2, c: 1 }, e: { r: 2, c: 4 } }, // Merge Project Name
                    { s: { r: 3, c: 1 }, e: { r: 3, c: 4 } }  // Merge Deadline
                ];

                XLSX.utils.book_append_sheet(wb, ws, "요청서");

                // --- 6. Write File ---
                XLSX.writeFile(wb, `${projectTitle || '카카오배너요청서'}_${deadline}.xlsx`);
                showNotification('엑셀(.xlsx) 파일이 다운로드되었습니다.');
            };

            const selectedItems = BANNER_LIST.filter(item => selectedIds.has(item.id));
            const selectedBannerItems = BANNER_LIST.filter(item => selectedIds.has(item.id));


            /* --- Step 1: Input Form View --- */
            // FIX: Changed from component to render function to prevent input focus loss
            const renderInputView = () => (
                <div className="max-w-4xl mx-auto flex flex-col gap-8 animate-fade-in-up pb-20">
                    <div className="bg-white p-6 md:p-8 rounded-lg shadow-sm border border-gray-100 space-y-6">
                        <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 border-b border-gray-100 pb-4">
                            <span className="w-2 h-2 bg-[#FEE500] rounded-full"></span>기본 정보
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><Label>프로젝트명</Label><Input value={projectTitle} onChange={(e) => setProjectTitle(e.target.value)} placeholder="(예시 - 므메미무 팝업 제품 판매)" /></div>
                            <div><Label>마감기한</Label><Input type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} /></div>
                        </div>
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-lg shadow-sm border border-gray-100">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                <span className="w-2 h-2 bg-[#FEE500] rounded-full"></span>제작 배너 선택
                            </h3>
                            <button onClick={handleSelectAll} className="text-sm text-gray-600 hover:text-[#121212] font-bold px-3 py-2 rounded bg-gray-100 hover:bg-gray-200 transition-colors">
                                {isAllSelected ? '전체 해제' : '모두 선택'}
                            </button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            {BANNER_LIST.map((item) => (
                                <button key={item.id} onClick={() => toggleSelection(item.id)} className={`text-left flex items-center gap-3 p-4 rounded-[4px] border transition-all duration-200 ${selectedIds.has(item.id) ? 'bg-[#FEE500]/10 border-[#FEE500] text-[#3A1D1D] font-bold ring-1 ring-[#FEE500]' : 'bg-gray-50 border-transparent text-gray-600 hover:bg-gray-100'}`}>
                                    {selectedIds.has(item.id) ? <CheckSquare size={20} className="shrink-0 text-[#3A1D1D]" /> : <Square size={20} className="shrink-0 text-gray-400" />}
                                    <span className="text-base truncate">{item.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {selectedItems.length > 0 && (
                        <div className="bg-white p-6 md:p-8 rounded-lg shadow-sm border border-gray-100">
                            <div className="flex items-center justify-between mb-6 pb-4 border-b border-gray-100">
                                <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-[#FEE500] rounded-full"></span>카피 입력 & 예시 확인
                                </h3>
                            </div>
                            <div className="space-y-6">
                                {selectedItems.map((item) => (
                                    <div key={item.id} className="bg-gray-50 border border-gray-200 p-6 rounded-[4px]">
                                        <div className="flex justify-between items-start mb-4">
                                            <h4 className="text-base md:text-lg font-bold flex items-center gap-2 text-[#3A1D1D]">
                                                <MessageCircle size={18} className="text-[#FEE500] fill-[#FEE500]" />
                                                {item.name}
                                            </h4>
                                            {item.exampleUrl && (
                                                <button onClick={() => toggleImage(item.id)} className={`text-sm flex items-center gap-2 px-3 py-2 rounded border transition-all ${visibleImages.has(item.id) ? 'bg-[#3A1D1D] text-white border-[#3A1D1D]' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100 font-medium'}`}>
                                                    {visibleImages.has(item.id) ? <><EyeOff size={14}/> 접기</> : <><Eye size={14}/> 예시 보기</>}
                                                </button>
                                            )}
                                        </div>
                                        {visibleImages.has(item.id) && (
                                            <div className="mb-6 p-4 bg-white border border-dashed border-gray-300 rounded text-center animate-fade-in-up">
                                                <img src={getEmbedUrl(item.exampleUrl)} alt={`${item.name} 예시`} className="max-w-full h-auto max-h-[400px] mx-auto object-contain rounded" onError={(e) => {e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x200?text=No+Image+Found';}} />
                                                <p className="text-sm text-gray-400 mt-2">참고용 예시 이미지입니다.</p>
                                            </div>
                                        )}
                                        {item.hasCopy ? (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {item.copyGuide.main !== null && (
                                                    <div>
                                                        <span className="text-xs font-bold text-gray-500 mb-1.5 block">메인 카피{item.copyGuide.main ? ` (${item.copyGuide.main})` : ''}</span>
                                                        <Input placeholder="메인 문구 입력" value={copyTexts[item.id]?.main || ''} onChange={(e) => handleCopyChange(item.id, 'main', e.target.value)} className="bg-white" />
                                                    </div>
                                                )}
                                                {item.copyGuide.sub !== null && (
                                                    <div>
                                                        <span className="text-xs font-bold text-gray-500 mb-1.5 block">서브 카피{item.copyGuide.sub ? ` (${item.copyGuide.sub})` : ''}</span>
                                                        <Input placeholder="서브 문구 입력" value={copyTexts[item.id]?.sub || ''} onChange={(e) => handleCopyChange(item.id, 'sub', e.target.value)} className="bg-white" />
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="text-sm text-gray-500 bg-gray-100 p-3 rounded text-center">별도의 카피 입력이 필요 없는 항목입니다. (디자인 작업만 필요)</div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="sticky bottom-4 mx-auto w-full max-w-lg">
                         <button 
                            onClick={() => {
                                window.scrollTo(0, 0);
                                setStep('result');
                            }}
                            className="w-full bg-[#121212] hover:bg-gray-800 text-white text-lg font-bold py-4 rounded-lg shadow-xl transition-all flex items-center justify-center gap-2"
                        >
                            요청서 작성 완료 <Send size={20} />
                        </button>
                    </div>
                </div>
            );

            /* --- Step 2: Result View --- */
            // FIX: Changed from component to render function
            const renderResultView = () => (
                <div className="max-w-6xl mx-auto animate-fade-in-up pb-20">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <button onClick={() => setStep('input')} className="text-gray-500 hover:text-[#121212] font-bold flex items-center gap-2 transition-colors px-4 py-2 rounded-lg hover:bg-white self-start">
                            <ArrowLeft size={20} /> 수정하기
                        </button>
                        <div className="flex gap-3 w-full md:w-auto">
                            <button onClick={copyToClipboard} className="flex-1 md:flex-none justify-center bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 px-6 py-3 rounded-lg font-bold flex items-center gap-2 shadow-sm transition-all">
                                <Copy size={18} /> 텍스트 복사
                            </button>
                            <button onClick={downloadExcel} className="flex-1 md:flex-none justify-center bg-[#FEE500] hover:bg-[#FEE500]/90 text-[#3A1D1D] px-6 py-3 rounded-lg font-bold flex items-center gap-2 shadow-sm transition-all">
                                <FileSpreadsheet size={18} /> 엑셀 저장
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow-md border border-gray-200 overflow-hidden">
                        <div className="p-6 md:p-8 border-b border-gray-100 bg-gray-50">
                            <h2 className="text-2xl font-bold text-gray-900 mb-2">{projectTitle}</h2>
                            <p className="text-gray-500 font-medium flex items-center gap-2"><span className="w-2 h-2 bg-red-500 rounded-full"></span> 마감기한: {deadline}</p>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-sm md:text-base text-left result-table min-w-[800px]">
                                <colgroup>
                                    <col style={{width: '20%'}} />
                                    <col style={{width: '30%'}} />
                                    <col style={{width: '30%'}} />
                                    <col style={{width: '20%'}} />
                                </colgroup>
                                <thead className="bg-gray-100 border-b border-gray-200 font-bold text-gray-700">
                                    <tr>
                                        <th>항목명</th>
                                        <th>메인 카피</th>
                                        <th>서브 카피</th>
                                        <th>비고</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {selectedBannerItems.length > 0 ? selectedBannerItems.map(item => {
                                        const texts = copyTexts[item.id] || {};
                                        return (
                                            <tr key={item.id}>
                                                <td className="font-bold text-gray-900">{item.name}</td>
                                                <td className="text-gray-700 whitespace-pre-wrap">{texts.main || '-'}</td>
                                                <td className="text-gray-700 whitespace-pre-wrap">{texts.sub || '-'}</td>
                                                <td className="text-gray-500">{item.note || 'KV 활용'}</td>
                                            </tr>
                                        );
                                    }) : (
                                        <tr>
                                            <td colSpan="4" className="p-12 text-center text-gray-400">선택된 배너가 없습니다.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div className="mt-8 text-center">
                        <p className="text-gray-400 text-sm mb-4">내용을 확인하셨나요?</p>
                        <button onClick={downloadExcel} className="bg-[#121212] hover:bg-gray-800 text-white text-lg font-bold px-12 py-4 rounded-lg shadow-xl transition-all inline-flex items-center gap-3">
                             엑셀 파일로 내려받기 <FileSpreadsheet size={20} />
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    <header className="flex flex-col md:flex-row md:items-center gap-4 pb-8 mb-4 border-b border-gray-200">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#FEE500] p-2.5 rounded-lg text-[#3A1D1D]">
                                <MessageCircle size={32} fill="currentColor" className="text-[#3A1D1D]" />
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-[#121212]">카카오 배너 요청서 생성기</h1>
                                <p className="text-sm md:text-base text-gray-500 mt-1">카카오톡 선물하기 입점/프로모션 배너와 카피를 쉽게 정리하세요.</p>
                            </div>
                        </div>
                    </header>

                    {step === 'input' ? renderInputView() : renderResultView()}

                    {notification && (
                        <div className="fixed bottom-8 right-8 bg-[#121212] text-white px-6 py-4 rounded-lg shadow-2xl flex items-center gap-3 z-50 animate-fade-in-up">
                            <CheckCircle size={20} className="text-[#FEE500]" />
                            <span className="text-base font-bold">{notification}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KakaoBannerApp />);
    </script>
</body>
</html>
